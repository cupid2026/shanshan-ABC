<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Words - 小学英语单词学习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Zcool+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', 'Zcool KuaiLe', sans-serif;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFE4B5 50%, #FFDAB9 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,159,67,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(72,219,251,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(20px) rotate(10deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Zcool KuaiLe', cursive;
            font-size: 3rem;
            color: #FF9F43;
            text-shadow: 3px 3px 0 #FF6B6B, 5px 5px 0 rgba(0,0,0,0.1);
            letter-spacing: 5px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo span {
            color: #48DBFB;
        }

        .progress-bar {
            background: white;
            border-radius: 25px;
            padding: 10px 20px;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .progress-text {
            font-size: 1.1rem;
            color: #2D3436;
            font-weight: 500;
        }

        .unit-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .unit-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .unit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .unit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .unit-btn.active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .unit-1 { background: #FF9F43; color: white; }
        .unit-2 { background: #48DBFB; color: white; }
        .unit-3 { background: #FF6B6B; color: white; }
        .unit-4 { background: #A29BFE; color: white; }
        .unit-5 { background: #00B894; color: white; }
        .unit-6 { background: #FDCB6E; color: #2D3436; }

        .word-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1), 0 0 0 5px rgba(255,159,67,0.2);
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #FF9F43, #FF6B6B, #48DBFB, #A29BFE, #00B894);
        }

        .word-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-word {
            font-size: 4rem;
            font-weight: 700;
            color: #FF9F43;
            text-shadow: 2px 2px 0 #FFE4B5;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .syllable {
            font-size: 2rem;
            color: #48DBFB;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .phonetic {
            font-size: 1.3rem;
            color: #95A5A6;
            font-style: italic;
            margin-bottom: 15px;
        }

        .meaning-badge {
            display: inline-block;
            background: linear-gradient(135deg, #A29BFE 0%, #6C5CE7 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }

        .sentences-section {
            margin-top: 30px;
        }

        .sentences-title {
            font-size: 1.5rem;
            color: #2D3436;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }

        .sentences-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: #FF9F43;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .sentence-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 5px solid #48DBFB;
        }

        .sentence-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .sentence-en {
            font-size: 1.2rem;
            color: #2D3436;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .sentence-zh {
            font-size: 1rem;
            color: #636E72;
            font-family: 'Zcool KuaiLe', cursive;
        }

        .highlight {
            background: linear-gradient(120deg, #FF6B6B 0%, #FF9F43 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255,107,107,0.4);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .nav-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .nav-btn:disabled {
            background: #DFE6E9;
            color: #B2BEC3;
            cursor: not-allowed;
        }

        .nav-prev {
            background: #FF9F43;
            color: white;
        }

        .nav-next {
            background: #48DBFB;
            color: white;
        }

        .word-nav-info {
            text-align: center;
            flex: 1;
        }

        .word-nav-info .current {
            font-size: 1.2rem;
            color: #2D3436;
            font-weight: 600;
        }

        .word-nav-info .total {
            font-size: 1rem;
            color: #95A5A6;
        }

        .word-selector {
            position: relative;
            margin-top: 20px;
            text-align: center;
        }

        .word-selector select {
            padding: 12px 25px;
            font-size: 1rem;
            font-family: 'Fredoka', sans-serif;
            border: 3px solid #A29BFE;
            border-radius: 25px;
            background: white;
            color: #2D3436;
            cursor: pointer;
            outline: none;
            min-width: 200px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .word-selector select:hover {
            border-color: #6C5CE7;
        }

        .audio-btn {
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            margin-left: 15px;
            vertical-align: middle;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        .audio-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }

        .audio-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .main-word {
                font-size: 2.5rem;
            }

            .syllable {
                font-size: 1.5rem;
            }

            .meaning-badge {
                font-size: 1.2rem;
                padding: 10px 20px;
            }

            .word-card {
                padding: 25px;
            }

            .nav-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .sentence-en {
                font-size: 1rem;
            }

            .unit-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        .decoration {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: rotate 10s linear infinite;
        }

        .decoration-1 {
            top: 20px;
            right: 20px;
        }

        .decoration-2 {
            bottom: 20px;
            left: 20px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #95A5A6;
            font-size: 0.9rem;
        }

        .category-badge {
            display: inline-block;
            background: #00B894;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>

        let allWords = [];
        let currentIndex = 0;
        let currentUnitIndex = 0;

        function flattenWords() {
            allWords = [];
            vocabularyData.units.forEach((unit, unitIndex) => {
                unit.categories.forEach(category => {
                    category.words.forEach(word => {
                        allWords.push({
                            ...word,
                            unitIndex: unitIndex,
                            unitName: unit.name,
                            categoryName: category.name
                        });
                    });
                });
            });
        }

        function populateWordSelector() {
            const selector = document.getElementById('wordSelector');
            selector.innerHTML = '<option value="">选择单词...</option>';

            vocabularyData.units.forEach((unit, unitIndex) => {
                const group = document.createElement('optgroup');
                group.label = unit.name;

                unit.categories.forEach(category => {
                    category.words.forEach((word) => {
                        const globalIndex = allWords.findIndex(w => w.id === word.id);
                        const option = document.createElement('option');
                        option.value = globalIndex;
                        option.textContent = `${word.word} - ${word.meaning}`;
                        group.appendChild(option);
                    });
                });

                selector.appendChild(group);
            });
        }

        function highlightWord(sentence, word) {
            const cleanWord = word.toLowerCase().replace(/[^a-z\s]/g, '');
            const words = cleanWord.split(/\s+/);

            let result = sentence;
            const highlighted = [];

            words.forEach(w => {
                if (w.length > 1) {
                    const regex = new RegExp(`\\b(${w}[s]?|${w}ing|${w}ed)?\\b`, 'gi');
                    result = result.replace(regex, (match) => {
                        if (match && !highlighted.includes(match.toLowerCase())) {
                            highlighted.push(match.toLowerCase());
                            return `<span class="highlight">${match}</span>`;
                        }
                        return match;
                    });
                }
            });

            if (!words.includes(cleanWord)) {
                const mainRegex = new RegExp(`\\b(${cleanWord}[s]?|${cleanWord}ing|${cleanWord}ed)?\\b`, 'gi');
                result = result.replace(mainRegex, (match) => {
                    if (match) {
                        return `<span class="highlight">${match}</span>`;
                    }
                    return match;
                });
            }

            return result;
        }

        function displayWord(index) {
            if (index < 0 || index >= allWords.length) return;

            currentIndex = index;
            const word = allWords[index];

            document.getElementById('mainWord').textContent = word.word;
            document.getElementById('syllable').textContent = word.syllables;
            document.getElementById('phonetic').textContent = word.phonetic;
            document.getElementById('meaning').textContent = word.meaning;
            document.getElementById('progressText').textContent = `单词 ${index + 1} / ${allWords.length}`;
            document.getElementById('currentWordNum').textContent = index + 1;

            const sentencesList = document.getElementById('sentencesList');
            sentencesList.innerHTML = '';

            word.sentences.forEach((sentence, idx) => {
                const highlightedEn = highlightWord(sentence.en, word.word);

                const sentenceItem = document.createElement('div');
                sentenceItem.className = 'sentence-item';
                sentenceItem.innerHTML = `
                    <div class="sentence-en">${idx + 1}. ${highlightedEn}</div>
                    <div class="sentence-zh">${sentence.zh}</div>
                `;
                sentencesList.appendChild(sentenceItem);
            });

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === allWords.length - 1;

            updateUnitNav(word.unitIndex);

            document.getElementById('wordSelector').value = index;
        }

        function updateUnitNav(unitIndex) {
            const buttons = document.querySelectorAll('.unit-btn');
            buttons.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === unitIndex);
            });
            currentUnitIndex = unitIndex;
        }

        function nextWord() {
            if (currentIndex < allWords.length - 1) {
                displayWord(currentIndex + 1);
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                displayWord(currentIndex - 1);
            }
        }

        function speakWord() {
            const word = allWords[currentIndex];
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word.word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            flattenWords();
            populateWordSelector();
            displayWord(0);

            document.getElementById('prevBtn').addEventListener('click', prevWord);
            document.getElementById('nextBtn').addEventListener('click', nextWord);
            document.getElementById('audioBtn').addEventListener('click', speakWord);

            document.getElementById('wordSelector').addEventListener('change', (e) => {
                if (e.target.value !== '') {
                    displayWord(parseInt(e.target.value));
                }
            });

            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const unitIndex = parseInt(btn.dataset.unit);
                    const firstWordInUnit = allWords.findIndex(w => w.unitIndex === unitIndex);
                    if (firstWordInUnit !== -1) {
                        displayWord(firstWordInUnit);
                    }
                });
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    nextWord();
                } else if (e.key === 'ArrowLeft') {
                    prevWord();
                } else if (e.key === ' ') {
                    e.preventDefault();
                    speakWord();
                }
            });
        });
    </script>
</body>
</html>
